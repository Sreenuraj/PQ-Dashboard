# PQ Dashboard Configuration

sources:
  - name: "VS Code Insiders"
    path: "~/Library/Application Support/Code - Insiders/User/globalStorage/postqode.postqode/tasks"
    enabled: true

  - name: "VS Code"
    path: "~/Library/Application Support/Code/User/globalStorage/postqode.postqode/tasks"
    enabled: true

  # Add more IDEs below as needed:
  # - name: "Cursor"
  #   path: "~/Library/Application Support/Cursor/User/globalStorage/postqode.postqode/tasks"
  #   enabled: false
  #
  # - name: "Windsurf"
  #   path: "~/Library/Application Support/Windsurf/User/globalStorage/postqode.postqode/tasks"
  #   enabled: false

processing:
  from_date: null       # e.g. "2026-01-01" — null means no lower bound
  to_date: null         # e.g. "2026-04-10" — null means today
  max_tasks: null       # e.g. 200 — null means unlimited
  min_task_size: 500    # bytes — skip tasks smaller than this
  skip_empty_tasks: true
  max_file_size: 10485760   # 10MB — skip files larger than this

cache:
  db_path: "./data/dashboard.db"
  incremental: true

server:
  port: 3456
  host: "localhost"
